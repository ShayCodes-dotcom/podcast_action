name: Generate Podcast Feeds
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Run Feed Generator
        uses: ShayCodes-dotcom/podcast_generator@master
        with:
          email: shjohnson413@outlook.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
